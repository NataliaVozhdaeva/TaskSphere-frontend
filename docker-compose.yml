version: '3.8'

services:
  backend:
    build:
      context: ../TaskSphere-backend  # adjust path to your backend repo
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=*
    volumes:
      # Mount your local database into the container (use full Windows path)
      - C:/Users/admin/OneDrive - Auckland Institute of Studies/Documents/CI-CD/assignment1/TaskSphere-backend/db.sqlite3:/app/db.sqlite3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend
