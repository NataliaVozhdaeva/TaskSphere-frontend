version: 2.1

jobs:
  build_frontend_image:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build frontend Docker image
          command: |
            docker build -t frontend-image:latest .

workflows:
  build_frontend:
    jobs:
      - build_frontend_image
